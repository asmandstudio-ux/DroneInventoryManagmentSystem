name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint/test/build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: droneims_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d droneims_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      ENV: dev
      JWT_SECRET_KEY: change-me
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/droneims_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Tests (pytest)
        run: |
          pytest -q

      - name: Build (compileall)
        run: |
          python -m compileall app

  node:
    name: Node (lint/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            web/package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: |
          npm run lint

      - name: Build
        run: |
          npm run build

  docker:
    name: Docker (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build --target api -t droneims-backend:ci .

      - name: Build worker image
        run: |
          docker build --target worker -t droneims-worker:ci .

      - name: Build dashboard image
        run: |
          docker build --target prod -t droneims-dashboard:ci web
