x-backend-env: &backend_env
  ENV: ${ENV:-dev}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/droneims}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-droneims}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
  S3_PRESIGN_EXPIRES_SECONDS: ${S3_PRESIGN_EXPIRES_SECONDS:-900}
  # Prefer external workers in compose to keep API responsive.
  REPORT_JOBS_INLINE: ${REPORT_JOBS_INLINE:-false}
  SCAN_JOBS_INLINE: ${SCAN_JOBS_INLINE:-false}

# Test profile env (isolated DB + MinIO; keeps jobs inline so tests don't need ai-worker)
x-backend-test-env: &backend_test_env
  <<: *backend_env
  ENV: test
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/droneims_test
  S3_ENDPOINT_URL: http://minio-test:9000
  S3_BUCKET: droneims-test
  REPORT_JOBS_INLINE: "true"
  SCAN_JOBS_INLINE: "true"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-droneims}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Bind to localhost only to avoid accidental LAN exposure.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-droneims}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Ephemeral Postgres for pytest runs (no ports, no persistent volumes).
  postgres-test:
    image: postgres:16
    profiles: ["test"]
    environment:
      POSTGRES_DB: droneims_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d droneims_test"]
      interval: 2s
      timeout: 2s
      retries: 30
    restart: "no"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T00-00-00Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40
    restart: unless-stopped

  # Ephemeral MinIO for pytest runs (no ports, no persistent volumes).
  minio-test:
    image: minio/minio:RELEASE.2025-01-20T00-00-00Z
    profiles: ["test"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/minio/health/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60
    restart: "no"

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T00-00-00Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/${S3_BUCKET:-droneims} || true &&
      mc anonymous set download local/${S3_BUCKET:-droneims} || true
      "
    restart: "no"

  minio-test-init:
    image: minio/mc:RELEASE.2025-01-17T00-00-00Z
    profiles: ["test"]
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio-test:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/droneims-test || true &&
      mc anonymous set download local/droneims-test || true
      "
    restart: "no"

  backend:
    build:
      context: .
      target: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *backend_env
    volumes:
      - ./:/srv/app
    ports:
      - "8000:8000"
    init: true
    command: >
      /bin/sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  ai-worker:
    build:
      context: .
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *backend_env
    volumes:
      - ./:/srv/app
    init: true
    command: >
      /bin/sh -c "
      alembic upgrade head &&
      python -m app.worker
      "
    restart: unless-stopped

  # Run backend pytest suite against isolated Postgres + MinIO.
  # Usage:
  #   docker compose --profile test up --build --abort-on-container-exit --exit-code-from backend-test backend-test
  backend-test:
    build:
      context: .
      target: test
    profiles: ["test"]
    depends_on:
      postgres-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
      minio-test-init:
        condition: service_completed_successfully
    environment:
      <<: *backend_test_env
    init: true
    restart: "no"

  dashboard:
    build:
      context: ./web
      target: dev
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    volumes:
      - ./web:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    init: true
    command: >
      /bin/sh -c "
      if [ -f package-lock.json ]; then
        [ -d node_modules ] && [ \"$(ls -A node_modules 2>/dev/null)\" ] || npm ci;
      else
        [ -d node_modules ] && [ \"$(ls -A node_modules 2>/dev/null)\" ] || npm install;
      fi &&
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  # Containerized Next.js lint+build (no local Node required).
  # Usage:
  #   docker compose --profile validate build dashboard-check
  dashboard-check:
    build:
      context: ./web
      target: check
    profiles: ["validate"]
    command: ["node", "-e", "console.log('dashboard-check: ok')"]
    restart: "no"

  # End-to-end smoke validation for backend + frontend.
  # Usage:
  #   docker compose --profile validate up --build --abort-on-container-exit --exit-code-from smoke smoke
  smoke:
    image: curlimages/curl:8.11.1
    profiles: ["validate"]
    depends_on:
      backend:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      set -e;
      echo "[smoke] backend /health" && curl -fsS http://backend:8000/health >/dev/null;
      echo "[smoke] backend /ready"  && curl -fsS http://backend:8000/ready  >/dev/null;
      echo "[smoke] dashboard /"     && curl -fsS http://dashboard:3000/     >/dev/null;
      echo "[smoke] ok";
    restart: "no"

volumes:
  pgdata:
  miniodata:
  redisdata:
  dashboard_node_modules:
